services:
  - type: web
    name: litera-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python -m app.services.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: http://127.0.0.1:5173
      - key: FRONTEND_ORIGINS
        sync: false
      - key: STORAGE_BACKEND
        value: s3
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        value: litera-pdfs
      - key: S3_PREFIX
        value: documents
      - key: MAX_PDF_SIZE_MB
        value: 15
      - key: DEMO_ADMIN_PASSWORD
        sync: false
      - key: DEMO_STUDENT_PASSWORD
        sync: false
